spring.application.name=hyperlocaldelivery

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/hyperlocal_delivery_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
