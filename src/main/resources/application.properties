spring.application.name=hyperlocaldelivery

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hyperlocal_delivery_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Dhanya@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Server Configuration
server.port=8080
server.servlet.context-path=/hyperlocaldelivery

# Logging
logging.level.root=INFO
logging.level.com.ecommerce.hyperlocaldelivery=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
