<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Partner | Hyperlocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-100 p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600">Hyperlocal <span class="text-gray-400 font-normal">Partner</span></h1>
            <button onclick="logout()" class="text-gray-500 hover:text-red-500 transition">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 sm:p-6">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 id="partnerName" class="text-2xl font-bold text-gray-800">Welcome!</h2>
                <p class="text-gray-500 text-sm">Ready for your next delivery?</p>
            </div>
            <div class="flex space-x-2 bg-gray-200 p-1 rounded-xl">
                <button onclick="switchTab('assigned')" id="tabAssigned" class="px-4 py-2 rounded-lg text-sm font-bold bg-white shadow-sm">My Tasks</button>
                <button onclick="switchTab('available')" id="tabAvailable" class="px-4 py-2 rounded-lg text-sm font-bold text-gray-500">Available</button>
            </div>
        </div>

        <div id="taskList" class="grid grid-cols-1 gap-4">
            <div class="p-10 text-center text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2"></i>
                <p>Fetching tasks...</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="delivery.js"></script>
</body>
</html>
