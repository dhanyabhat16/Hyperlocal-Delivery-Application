<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register | Hyperlocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">Create Account</h2>
        
        <form onsubmit="register(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700">Full Name</label>
                <input id="name" type="text" required class="w-full px-3 py-2 border rounded-lg focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">Email Address</label>
                <input id="email" type="email" required class="w-full px-3 py-2 border rounded-lg focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">Password</label>
                <input id="password" type="password" required class="w-full px-3 py-2 border rounded-lg focus:ring-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">City</label>
                <input id="city" type="text" required class="w-full px-3 py-2 border rounded-lg focus:ring-indigo-500" placeholder="e.g. Bengaluru">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">I am a...</label>
                <select id="role" class="w-full px-3 py-2 border rounded-lg focus:ring-indigo-500">
                    <option value="CUSTOMER">Customer</option>
                    <option value="DELIVERY">Delivery Partner</option>
                    <option value="WAREHOUSE">Warehouse Manager</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                Register
            </button>
        </form>

        <p id="msg" class="text-center text-sm mt-4"></p>
        
        <p class="text-center text-sm text-slate-500 mt-4">
            Already have an account? <a href="login.html" class="text-indigo-600 hover:underline">Login</a>
        </p>
    </div>

    <script>
        const API_BASE = "http://localhost:8080/hyperlocaldelivery/api";

        async function register(e) {
            e.preventDefault();
            const status = document.getElementById("msg");
            status.innerText = "Processing...";
            status.className = "text-indigo-600 mt-2 text-center";

            const payload = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                city: document.getElementById("city").value,
                role: document.getElementById("role").value
            };

            try {
                const response = await fetch(`${API_BASE}/public/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // Status 201 is Created
                if (response.status === 201 || data.token) {
                    status.innerText = "Registration successful! Redirecting...";
                    status.className = "text-green-500 mt-2 text-center";
                    setTimeout(() => window.location.href = "login.html", 1500);
                } else {
                    status.innerText = data.message || "Error creating account";
                    status.className = "text-red-500 mt-2 text-center";
                }
            } catch (err) {
                status.innerText = "Connection failed. Is the Spring Boot server running?";
                status.className = "text-red-500 mt-2 text-center";
                console.error(err);
            }
        }
    </script>
</body>
</html>
