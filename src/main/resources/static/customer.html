<!DOCTYPE html>
<html lang="en">
<head>
    <title>Customer Dashboard | Hyperlocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-6 border-b">
            <h2 class="text-2xl font-bold text-indigo-600 italic">Hyperlocal.</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="loadProducts()" class="w-full flex items-center space-x-3 p-3 bg-indigo-50 text-indigo-600 rounded-xl font-medium">
                <i class="fa-solid fa-house"></i><span>Browse Shops</span>
            </button>
            <button onclick="loadOrders()" class="w-full flex items-center space-x-3 p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition">
                <i class="fa-solid fa-box"></i><span>My Orders</span>
            </button>
        </nav>
        <div class="p-4 border-t">
            <button onclick="logout()" class="w-full flex items-center space-x-2 text-red-500 hover:bg-red-50 p-2 rounded-lg transition text-sm">
                <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-10">
            <h1 class="text-lg font-semibold text-gray-800" id="viewTitle">Local Marketplace</h1>
            <div class="flex items-center space-x-6">
                <span class="text-sm text-gray-500">Welcome, <span id="displayUserName" class="font-bold text-gray-800">User</span></span>
                <button onclick="toggleCart()" class="relative p-2 text-gray-600 hover:text-indigo-600 transition">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full px-1.5 py-0.5 border-2 border-white">0</span>
                </button>
            </div>
        </header>

        <section id="mainContent" class="p-8">
            <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-gray-400">Loading fresh products...</p>
            </div>
        </section>
    </main>
<script src="script.js"></script>
    <script src="customer.js"></script>
    <script src="script.js"></script>
    <script src="customer.js"></script>
    <script>
        // Only keep the 'startup' call here
        window.onload = () => {
            if(typeof loadProducts === 'function') loadProducts();
            if(typeof updateCartUI === 'function') updateCartUI();
        };
    </script>

</body>
</html>
