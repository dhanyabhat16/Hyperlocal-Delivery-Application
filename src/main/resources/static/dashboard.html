<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Hyperlocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">

<aside class="w-64 bg-white border-r flex flex-col">
    <div class="p-6 border-b">
        <h2 class="text-xl font-bold text-indigo-600 italic">Hyperlocal.</h2>
    </div>

    <div class="p-4 mt-auto border-t">
        <p class="text-sm font-bold" id="userName">User</p>
        <p class="text-xs text-gray-400" id="userRole">Role</p>

        <button onclick="logout()" class="w-full mt-4 text-red-500">
            Logout
        </button>
    </div>
</aside>

<main class="flex-1 overflow-y-auto">

<header class="h-16 bg-white border-b flex items-center px-8">
    <h1 class="text-lg font-semibold">Admin Dashboard</h1>
</header>

<section class="p-8">

    <div class="space-x-4 mb-6">
        <button onclick="loadUsers()" class="bg-indigo-600 text-white px-4 py-2 rounded">Users</button>
        <button onclick="loadOrders()" class="bg-indigo-600 text-white px-4 py-2 rounded">Orders</button>
        <button onclick="loadWarehouses()" class="bg-indigo-600 text-white px-4 py-2 rounded">Warehouses</button>
        <button onclick="loadInventory()" class="bg-indigo-600 text-white px-4 py-2 rounded">Inventory</button>
        <button onclick="generateReport()" class="bg-green-600 text-white px-4 py-2 rounded">Report</button>
    </div>

    <div id="adminData"></div>

</section>
</main>

<script>

const API_BASE = "http://localhost:8080/hyperlocaldelivery/api";
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");
const userName = localStorage.getItem("userName") || "Admin";

document.getElementById("userName").innerText = userName;
document.getElementById("userRole").innerText = role || "ADMIN";

const statusFlow = [
    "PLACED","PACKED","ASSIGNED","PICKED_UP","ON_THE_WAY","DELIVERED"
];

window.onload = () => {
    if (!token) {
        alert("Session expired");
        window.location.href = "index.html";
        return;
    }
    loadOrders();
};

function getAllowedStatuses(current) {
    if (current === "DELIVERED" || current === "CANCELLED") return [current];
    const index = statusFlow.indexOf(current);
    return [...statusFlow.slice(index), "CANCELLED"];
}

function getStatusColor(status) {
    switch (status) {
        case "PLACED": return "text-gray-600";
        case "PACKED": return "text-blue-600";
        case "ASSIGNED": return "text-purple-600";
        case "PICKED_UP": return "text-yellow-600";
        case "ON_THE_WAY": return "text-orange-600";
        case "DELIVERED": return "text-green-600";
        case "CANCELLED": return "text-red-600";
        default: return "";
    }
}

async function loadOrders() {
    const res = await fetch(`${API_BASE}/admin/orders`, {
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();
    const orders = data.data || [];

    let html = `
    <table class="w-full border text-center">
    <tr class="bg-gray-100">
        <th>Order ID</th>
        <th>Status</th>
        <th>Total</th>
        <th>Update</th>
    </tr>
    `;

    orders.forEach(o => {
        const allowed = getAllowedStatuses(o.status);

        let options = "";
        allowed.forEach(s => {
            options += `<option ${s === o.status ? "selected" : ""}>${s}</option>`;
        });

        const isFinal = o.status === "DELIVERED" || o.status === "CANCELLED";

        html += `
        <tr>
            <td>${o.orderId}</td>
            <td class="${getStatusColor(o.status)} font-semibold">${o.status}</td>
            <td>₹${o.totalAmount}</td>
            <td>
                <select id="status-${o.orderId}" class="border px-2 py-1 rounded" ${isFinal ? "disabled" : ""}>
                    ${options}
                </select>

                <button onclick="updateOrderStatus(${o.orderId})"
                ${isFinal 
                    ? "disabled class='bg-gray-400 cursor-not-allowed px-3 py-1 rounded ml-2'" 
                    : "class='bg-green-600 text-white px-3 py-1 rounded ml-2'"}>

                    Update
                </button>
            </td>
        </tr>
        `;
    });

    html += "</table>";
    document.getElementById("adminData").innerHTML = html;
}

async function updateOrderStatus(orderId) {
    const newStatus = document.getElementById(`status-${orderId}`).value;

    if (!confirm("Update order status?")) return;

    const res = await fetch(
        `${API_BASE}/admin/orders/${orderId}/status?status=${newStatus}`,
        {
            method: "PUT",
            headers: { "Authorization": "Bearer " + token }
        }
    );

    if (res.ok) {
        alert("Updated successfully");
        loadOrders();
    } else {
        alert("Update failed");
    }
}

async function loadUsers() {
    const res = await fetch(`${API_BASE}/admin/users`, {
        headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    renderTable(data.data);
}

async function loadWarehouses() {
    const res = await fetch(`${API_BASE}/admin/warehouses`, {
        headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    renderTable(data.data);
}

/* 🔥 NEW: INVENTORY */
async function loadInventory() {
    const res = await fetch(`${API_BASE}/public/products`);
    const data = await res.json();
    const products = data.data || [];

    let html = `
    <table class="w-full border text-center">
    <tr class="bg-gray-100">
        <th>Name</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Status</th>
    </tr>
    `;

    products.forEach(p => {
        html += `
        <tr>
            <td>${p.name}</td>
            <td>₹${p.price}</td>
            <td>${p.quantity}</td>
            <td>
                ${p.quantity < 10 
                    ? '<span class="text-red-500 font-bold">Low Stock</span>' 
                    : '<span class="text-green-500">OK</span>'}
            </td>
        </tr>
        `;
    });

    html += "</table>";
    document.getElementById("adminData").innerHTML = html;
}

/* 🔥 NEW: REPORT */
async function generateReport() {
    const res = await fetch(`${API_BASE}/public/products`);
    const data = await res.json();
    const products = data.data || [];

    const totalProducts = products.length;
    const totalStock = products.reduce((sum, p) => sum + p.quantity, 0);

    const html = `
    <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">Inventory Report</h2>
        <p><b>Total Products:</b> ${totalProducts}</p>
        <p><b>Total Stock:</b> ${totalStock}</p>
    </div>
    `;

    document.getElementById("adminData").innerHTML = html;
}

function renderTable(data) {
    if (!data || data.length === 0) {
        document.getElementById("adminData").innerHTML = "No data available";
        return;
    }

    let html = "<table class='w-full border text-center'><tr>";

    Object.keys(data[0]).forEach(k => {
        html += `<th class="border px-2">${k}</th>`;
    });

    html += "</tr>";

    data.forEach(row => {
        html += "<tr>";
        Object.values(row).forEach(v => {
            html += `<td class="border px-2">${v}</td>`;
        });
        html += "</tr>";
    });

    html += "</table>";

    document.getElementById("adminData").innerHTML = html;
}

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

</script>

</body>
</html>
