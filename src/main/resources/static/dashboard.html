<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard | Hyperlocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-6 border-b">
            <h2 class="text-xl font-bold text-indigo-600 italic">Hyperlocal.</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2" id="sidebarMenu">
            </nav>
        <div class="p-4 border-t">
            <div id="userProfile" class="flex items-center space-x-3 mb-4 p-2">
                <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-white text-xs" id="userInitial">U</div>
                <div>
                    <p class="text-sm font-bold text-gray-700" id="userName">User</p>
                    <p class="text-xs text-gray-400 capitalize" id="userRole">Role</p>
                </div>
            </div>
            <button onclick="logout()" class="w-full flex items-center space-x-2 text-red-500 hover:bg-red-50 p-2 rounded-lg transition text-sm">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h1 class="text-lg font-semibold text-gray-800" id="viewTitle">Dashboard Overview</h1>
            <div class="flex items-center space-x-4">
                <div id="cartStatus" class="hidden">
                    <button class="relative p-2 text-gray-400 hover:text-indigo-600">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span id="cartCount" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] rounded-full px-1.5">0</span>
                    </button>
                </div>
            </div>
        </header>

        <section id="mainContent" class="p-8">
            </section>
    </main>

    <script>
        const API_BASE = "http://localhost:8080/hyperlocaldelivery/api";
        const role = localStorage.getItem("role");
        const userId = localStorage.getItem("customerId") || localStorage.getItem("userId");
        const userName = localStorage.getItem("userName") || "User";

        // Initialize UI
        document.getElementById("userName").innerText = userName;
        document.getElementById("userInitial").innerText = userName.charAt(0);
        document.getElementById("userRole").innerText = role.toLowerCase();

        window.onload = () => {
            if (role === "CUSTOMER") renderCustomer();
            else if (role === "DELIVERY") renderDelivery();
            else if (role === "WAREHOUSE") renderWarehouse();
            else renderAdmin();
        };

        // --- CUSTOMER MODULE ---
        async function renderCustomer() {
            document.getElementById("cartStatus").classList.remove("hidden");
            document.getElementById("viewTitle").innerText = "Browse Products";
            
            const response = await fetch(`${API_BASE}/public/products`);
            const data = await response.json();
            const products = data?.data || [];
            
            let html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">`;
            products.forEach(p => {
                html += `
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <div class="h-32 bg-gray-100 rounded-lg mb-4 flex items-center justify-center text-gray-400 italic">Product Image</div>
                    <h3 class="font-bold text-gray-800">${p.name}</h3>
                    <p class="text-xs text-gray-500">${p.category}</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-indigo-600 font-bold">₹${p.price}</span>
                        <button onclick="addToCart(${p.productId})" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-indigo-700">Add</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            document.getElementById("mainContent").innerHTML = html;
        }

        // --- DELIVERY MODULE ---
        async function renderDelivery() {
            document.getElementById("viewTitle").innerText = "Delivery Assignments";
            // ... (Your existing fetch logic for available/assigned orders)
            // Use Tailwind cards with colored badges for status
            document.getElementById("mainContent").innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">Available for Pickup</h2>
                        <div id="availableOrders" class="space-y-3 text-gray-500">Scanning for orders...</div>
                    </div>
                </div>`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
